<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid" width="200" height="200" style="shape-rendering: auto; display: block; background: rgba(255, 255, 255, 0);">
  <defs>
    <!-- Define the orbital path once -->
    <path id="orbit-path" d="M50 15 A15 35 0 0 1 50 85 A15 35 0 0 1 50 15" fill="none" />
  </defs>

  <!-- 1. Background: Draw all orbit paths first so they are behind everything -->
  <g id="orbits">
    <use href="#orbit-path" stroke="#f1f2f3" stroke-width="3" transform="rotate(0 50 50)" />
    <use href="#orbit-path" stroke="#f1f2f3" stroke-width="3" transform="rotate(60 50 50)" />
    <use href="#orbit-path" stroke="#f1f2f3" stroke-width="3" transform="rotate(120 50 50)" />
  </g>

  <!-- 2. Middle: Nucleus -->
  <circle cx="50" cy="50" r="5" fill="#555" opacity="0.2" />

  <!-- 3. Foreground: Draw all electrons last so they are always on top -->
  <g id="electrons">
    <!-- Electron 1 (Red) -->
    <g transform="rotate(0 50 50)">
      <circle r="6" fill="#e15b64">
        <animateMotion repeatCount="indefinite" dur="2s" begin="0s" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
          <mpath href="#orbit-path" />
        </animateMotion>
      </circle>
    </g>

    <!-- Electron 2 (Orange) -->
    <g transform="rotate(60 50 50)">
      <circle r="6" fill="#f8b26a">
        <animateMotion repeatCount="indefinite" dur="2s" begin="-0.66s" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
          <mpath href="#orbit-path" />
        </animateMotion>
      </circle>
    </g>

    <!-- Electron 3 (Green) -->
    <g transform="rotate(120 50 50)">
      <circle r="6" fill="#abbd81">
        <animateMotion repeatCount="indefinite" dur="2s" begin="-1.33s" keyPoints="0;1" keyTimes="0;1" calcMode="linear">
          <mpath href="#orbit-path" />
        </animateMotion>
      </circle>
    </g>
  </g>
</svg>